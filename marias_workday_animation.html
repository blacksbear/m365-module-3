
<style>
  #mw-wrap { font-family: var(--font-sans); background: var(--color-background-secondary); border-radius: var(--border-radius-lg); overflow: hidden; }
  #mw-screen { background: #1a3a5c; position: relative; padding: 0; overflow: hidden; min-height: 340px; }
  #mw-scene { width: 100%; height: 340px; position: relative; }

  /* desk */
  #desk { position: absolute; bottom: 0; left: 0; right: 0; height: 90px; background: #8B6F47; border-top: 4px solid #6B5037; }
  #desk-surface { position: absolute; top: 0; left: 0; right: 0; height: 18px; background: #C4A472; }

  /* laptop */
  #laptop-base { position: absolute; bottom: 88px; left: 50%; transform: translateX(-50%); width: 220px; height: 16px; background: #888; border-radius: 3px 3px 0 0; }
  #laptop-screen { position: absolute; bottom: 103px; left: 50%; transform: translateX(-50%); width: 200px; height: 130px; background: #E8F4FB; border: 3px solid #555; border-radius: 6px 6px 0 0; overflow: hidden; }
  #laptop-screen-inner { padding: 6px; height: 100%; }

  /* Maria SVG character */
  #maria-container { position: absolute; bottom: 86px; right: 80px; }

  /* inbox panel on laptop */
  #inbox-panel { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #f0f4f8; padding: 4px; }
  #inbox-title-bar { background: #185FA5; color: white; font-size: 9px; padding: 2px 5px; border-radius: 2px; margin-bottom: 3px; font-weight: 500; }
  #email-list { display: flex; flex-direction: column; gap: 1px; }
  .em { height: 8px; border-radius: 2px; background: white; border-left: 3px solid #185FA5; transition: all 0.4s; display: flex; align-items: center; padding: 0 3px; overflow: hidden; }
  .em.read { border-left-color: #ccc; background: #f7f7f7; opacity: 0.5; }
  .em.filing { border-left-color: #1D9E75; background: #E1F5EE; }
  .em.flagged { border-left-color: #BA7517; background: #FAEEDA; }
  .em.archiving { opacity: 0; transform: translateX(20px); }
  .em-dot { width: 4px; height: 4px; border-radius: 50%; background: #185FA5; flex-shrink: 0; margin-right: 3px; }
  .em.read .em-dot { background: #ccc; }
  .em-line { height: 3px; background: #ddd; border-radius: 1px; flex: 1; }

  /* counter badge */
  #badge { position: absolute; top: 5px; right: 8px; background: #E24B4A; color: white; border-radius: 10px; font-size: 10px; font-weight: 700; padding: 1px 6px; transition: all 0.5s; }

  /* folder area below laptop on desk */
  #folder-row { position: absolute; bottom: 90px; left: 30px; display: flex; gap: 8px; }
  .folder-box { width: 54px; border-radius: 4px; overflow: hidden; opacity: 0; transition: opacity 0.5s; }
  .folder-tab { height: 8px; border-radius: 3px 3px 0 0; font-size: 0; }
  .folder-body { height: 30px; display: flex; align-items: center; justify-content: center; font-size: 7.5px; font-weight: 600; text-align: center; line-height: 1.2; padding: 2px; }
  #f-action .folder-tab { background: #D85A30; }
  #f-action .folder-body { background: #FAECE7; color: #712B13; }
  #f-ref .folder-tab { background: #185FA5; }
  #f-ref .folder-body { background: #E6F1FB; color: #0C447C; }
  #f-arch .folder-tab { background: #888780; }
  #f-arch .folder-body { background: #F1EFE8; color: #444441; }

  /* flying email particles */
  .fly-email { position: absolute; width: 16px; height: 11px; border-radius: 2px; opacity: 0; pointer-events: none; transition: none; }

  /* speech bubble */
  #bubble { position: absolute; background: white; border: 1.5px solid #D3D1C7; border-radius: 10px; padding: 6px 10px; font-size: 11px; font-weight: 500; color: #1a1a18; white-space: nowrap; opacity: 0; transition: opacity 0.3s; top: 30px; right: 80px; }
  #bubble::after { content: ''; position: absolute; bottom: -9px; right: 20px; border: 5px solid transparent; border-top-color: #D3D1C7; }
  #bubble-inner::after { content: ''; position: absolute; bottom: -7px; right: 21px; border: 4px solid transparent; border-top-color: white; }

  /* progress bar */
  #progress-bar-wrap { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 200px; }
  #progress-track { height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }
  #progress-fill { height: 100%; background: #1D9E75; border-radius: 2px; width: 0%; transition: width 0.8s; }
  #progress-label { text-align: center; font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 3px; }

  /* caption bar */
  #caption { background: rgba(0,0,0,0.55); padding: 8px 16px; font-size: 12px; color: rgba(255,255,255,0.9); min-height: 36px; display: flex; align-items: center; gap: 8px; transition: opacity 0.3s; }
  #caption-scene { font-size: 10px; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); border-radius: 10px; padding: 2px 8px; flex-shrink: 0; }

  /* controls */
  #controls { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-top: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); }
  #play-btn { width: 36px; height: 36px; border-radius: 50%; background: #185FA5; color: white; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; border: none; transition: background 0.2s; }
  #play-btn:hover { background: #0C447C; }
  #scrubber { flex: 1; }
  #scene-label { font-size: 12px; color: var(--color-text-secondary); min-width: 80px; text-align: right; }

  /* confetti */
  .confetti-bit { position: absolute; width: 6px; height: 6px; border-radius: 1px; opacity: 0; pointer-events: none; }

  #zero-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,110,86,0.85); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; opacity: 0; transition: opacity 0.6s; pointer-events: none; }
  #zero-num { font-size: 64px; font-weight: 700; color: white; line-height: 1; }
  #zero-label { font-size: 14px; color: #9FE1CB; font-weight: 500; }
</style>

<div id="mw-wrap">
  <div id="mw-screen">
    <div id="mw-scene">
      <div id="desk"><div id="desk-surface"></div></div>

      <div id="folder-row">
        <div class="folder-box" id="f-action"><div class="folder-tab"></div><div class="folder-body">Action<br>folder</div></div>
        <div class="folder-box" id="f-ref"><div class="folder-tab"></div><div class="folder-body">Reference<br>folder</div></div>
        <div class="folder-box" id="f-arch"><div class="folder-tab"></div><div class="folder-body">Archive<br>folder</div></div>
      </div>

      <div id="laptop-base"></div>
      <div id="laptop-screen">
        <div id="inbox-panel">
          <div id="inbox-title-bar">Inbox — <span id="unread-label">54 unread</span></div>
          <div id="email-list"></div>
        </div>
        <div id="badge">54</div>
      </div>

      <div id="maria-container">
        <svg width="72" height="120" viewBox="0 0 72 120">
          <ellipse cx="36" cy="28" rx="16" ry="18" fill="#F5C4A0"/>
          <path d="M20 28 Q14 20 18 12 Q26 4 36 6 Q46 4 54 12 Q58 20 52 28" fill="#3D2B1F"/>
          <ellipse cx="30" cy="26" rx="3" ry="3.5" fill="white"/>
          <ellipse cx="42" cy="26" rx="3" ry="3.5" fill="white"/>
          <circle cx="30" cy="26.5" r="1.8" fill="#2C1810"/>
          <circle cx="42" cy="26.5" r="1.8" fill="#2C1810"/>
          <path id="maria-mouth" d="M30 35 Q36 39 42 35" fill="none" stroke="#C07050" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M22 42 Q14 38 12 50 L12 80 Q12 85 18 85 L54 85 Q60 85 60 80 L60 50 Q58 38 50 42 Q43 46 36 46 Q29 46 22 42Z" fill="#4A90D9"/>
          <path d="M36 46 L36 85" stroke="#3A80C9" stroke-width="1" fill="none"/>
          <rect x="22" y="44" width="5" height="32" rx="2" fill="#F5C4A0"/>
          <rect x="45" y="44" width="5" height="32" rx="2" fill="#F5C4A0"/>
          <path id="arm-left" d="M22 50 Q10 60 8 72" fill="none" stroke="#4A90D9" stroke-width="8" stroke-linecap="round"/>
          <path id="arm-right" d="M50 50 Q62 60 64 72" fill="none" stroke="#4A90D9" stroke-width="8" stroke-linecap="round"/>
          <ellipse cx="8" cy="74" rx="6" ry="5" fill="#F5C4A0"/>
          <ellipse cx="64" cy="74" rx="6" ry="5" fill="#F5C4A0"/>
          <rect x="26" y="85" width="8" height="30" rx="3" fill="#2C5282"/>
          <rect x="38" y="85" width="8" height="30" rx="3" fill="#2C5282"/>
          <ellipse cx="29" cy="116" rx="7" ry="4" fill="#1A365D"/>
          <ellipse cx="43" cy="116" rx="7" ry="4" fill="#1A365D"/>
        </svg>
      </div>

      <div id="bubble"><span id="bubble-text">Monday morning...</span></div>

      <div id="zero-overlay">
        <div id="zero-num">0</div>
        <div id="zero-label">Inbox zero!</div>
      </div>

      <div id="progress-bar-wrap">
        <div id="progress-track"><div id="progress-fill"></div></div>
        <div id="progress-label" id="progress-label">Scene 1 of 5</div>
      </div>
    </div>
    <div id="caption"><span id="caption-scene">Scene 1</span><span id="caption-text">It's Monday morning. Maria opens her Outlook inbox — 54 unread emails.</span></div>
  </div>
  <div id="controls">
    <button id="play-btn" title="Play / Pause">&#9654;</button>
    <input id="scrubber" type="range" min="0" max="4" step="1" value="0" style="flex:1;">
    <span id="scene-label">Scene 1 / 5</span>
  </div>
</div>

<script>
(function(){
  const EMAILS = 18;
  const list = document.getElementById('email-list');
  const badge = document.getElementById('badge');
  const unreadLabel = document.getElementById('unread-label');

  function buildEmails() {
    list.innerHTML = '';
    for (let i = 0; i < EMAILS; i++) {
      const d = document.createElement('div');
      d.className = 'em';
      d.id = 'em' + i;
      d.innerHTML = '<div class="em-dot"></div><div class="em-line"></div>';
      list.appendChild(d);
    }
  }
  buildEmails();

  const scenes = [
    {
      label: 'Scene 1',
      caption: "It's Monday morning. Maria opens her Outlook inbox — 54 unread emails. Sound familiar? But Maria isn't stressed — she has a system.",
      bubble: 'Monday morning...',
      showBubble: true,
      progress: 0,
      badgeNum: 54,
      unread: '54 unread',
      folders: false,
      emailState: 'all-unread',
      mouthHappy: true
    },
    {
      label: 'Scene 2',
      caption: "Maria applies the 2-minute rule: quick emails get an immediate response or archive. Anything under 2 minutes — do it now!",
      bubble: '2-minute rule!',
      showBubble: true,
      progress: 25,
      badgeNum: 38,
      unread: '38 unread',
      folders: false,
      emailState: 'some-read',
      mouthHappy: true
    },
    {
      label: 'Scene 3',
      caption: "She creates three folders: Action (needs a real response), Reference (keep for later), Archive (done with it). Everything finds a home.",
      bubble: 'Three folders!',
      showBubble: true,
      progress: 50,
      badgeNum: 22,
      unread: '22 unread',
      folders: true,
      emailState: 'sorting',
      mouthHappy: true
    },
    {
      label: 'Scene 4',
      caption: "Emails fly into their folders. Flagged items in Action, reference material in Reference, done emails in Archive. Inbox shrinking fast.",
      bubble: 'Almost there...',
      showBubble: true,
      progress: 75,
      badgeNum: 6,
      unread: '6 unread',
      folders: true,
      emailState: 'mostly-filed',
      mouthHappy: true
    },
    {
      label: 'Scene 5',
      caption: "By end of day — inbox zero! Action folder has 4 follow-ups for tomorrow. Everything has a place. Maria's system works.",
      bubble: 'Inbox zero!',
      showBubble: true,
      progress: 100,
      badgeNum: 0,
      unread: '0 unread',
      folders: true,
      emailState: 'zero',
      mouthHappy: true,
      showZero: true
    }
  ];

  let currentScene = 0;
  let playing = false;
  let timer = null;

  const playBtn = document.getElementById('play-btn');
  const scrubber = document.getElementById('scrubber');
  const sceneLabel = document.getElementById('scene-label');
  const captionText = document.getElementById('caption-text');
  const captionScene = document.getElementById('caption-scene');
  const bubble = document.getElementById('bubble');
  const bubbleText = document.getElementById('bubble-text');
  const progressFill = document.getElementById('progress-fill');
  const progressLabelEl = document.getElementById('progress-label');
  const zeroOverlay = document.getElementById('zero-overlay');
  const fAction = document.getElementById('f-action');
  const fRef = document.getElementById('f-ref');
  const fArch = document.getElementById('f-arch');
  const mariaMouth = document.getElementById('maria-mouth');

  function applyScene(idx) {
    const s = scenes[idx];
    captionText.textContent = s.caption;
    captionScene.textContent = s.label;
    sceneLabel.textContent = 'Scene ' + (idx+1) + ' / 5';
    scrubber.value = idx;

    badge.textContent = s.badgeNum;
    unreadLabel.textContent = s.unread;
    badge.style.display = s.badgeNum === 0 ? 'none' : 'block';

    progressFill.style.width = s.progress + '%';
    progressLabelEl.textContent = s.label + ' of 5';

    if (s.showBubble) {
      bubbleText.textContent = s.bubble;
      bubble.style.opacity = '1';
    } else {
      bubble.style.opacity = '0';
    }

    fAction.style.opacity = s.folders ? '1' : '0';
    fRef.style.opacity = s.folders ? '1' : '0';
    fArch.style.opacity = s.folders ? '1' : '0';

    zeroOverlay.style.opacity = s.showZero ? '1' : '0';

    mariaMouth.setAttribute('d', 'M30 35 Q36 39 42 35');

    const emails = document.querySelectorAll('.em');
    emails.forEach((em, i) => {
      em.className = 'em';
      if (s.emailState === 'all-unread') {
        em.className = 'em';
      } else if (s.emailState === 'some-read') {
        if (i < 6) em.className = 'em read';
      } else if (s.emailState === 'sorting') {
        if (i < 6) em.className = 'em read';
        if (i >= 6 && i < 10) em.className = 'em flagged';
        if (i >= 10 && i < 14) em.className = 'em filing';
      } else if (s.emailState === 'mostly-filed') {
        if (i < 14) em.className = 'em archiving';
        else em.className = 'em flagged';
      } else if (s.emailState === 'zero') {
        em.className = 'em archiving';
      }
    });
  }

  function nextScene() {
    if (currentScene < scenes.length - 1) {
      currentScene++;
      applyScene(currentScene);
    } else {
      stopPlay();
    }
  }

  function startPlay() {
    playing = true;
    playBtn.innerHTML = '&#9646;&#9646;';
    timer = setInterval(() => { nextScene(); }, 3200);
  }

  function stopPlay() {
    playing = false;
    playBtn.innerHTML = '&#9654;';
    if (timer) { clearInterval(timer); timer = null; }
  }

  playBtn.addEventListener('click', () => {
    if (playing) {
      stopPlay();
    } else {
      if (currentScene >= scenes.length - 1) { currentScene = 0; applyScene(0); }
      startPlay();
    }
  });

  scrubber.addEventListener('input', () => {
    stopPlay();
    currentScene = parseInt(scrubber.value);
    applyScene(currentScene);
  });

  applyScene(0);
})();
</script>
